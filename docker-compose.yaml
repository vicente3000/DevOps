services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personas_app
    ports:
      - "${APP_PORT}:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: personas_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: 0.50
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: personas_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - db
    mem_limit: 256m
    cpus: 0.25
    restart: unless-stopped

volumes:
  postgres_data:
